name: project-forge

services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      # Hot-reload: monta código fonte no container
      - .:/app
      # Preserva node_modules do container (não sobrescrever com host)
      - app_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    # Instala deps e sobe o dev server com hot-reload
    command: sh -c "npm ci && npm run dev"
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Serviço auxiliar: apenas para rodar prisma commands
  # Uso: docker compose --profile tools run prisma <comando>
  # Exemplos:
  #   docker compose --profile tools run prisma npx prisma migrate dev
  #   docker compose --profile tools run prisma npx prisma studio
  prisma:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    env_file:
      - .env.docker
    profiles:
      - tools
    command: sh -c "npx prisma studio"
    ports:
      - "5555:5555"

volumes:
  app_node_modules:
